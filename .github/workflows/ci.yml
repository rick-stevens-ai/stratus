name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-smoke:
    name: build + smoke (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: ['20', '22', '24', '26']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Smoke test (13 tier checks)
        run: npm run smoke

  origin-clean:
    name: origin-clean guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert no origin-stack vocabulary in tracked files
        run: |
          # FALDA is born-clean US-origin. Block any reintroduction of
          # origin-stack vocabulary in tracked source/docs/prose.
          if git grep -inE 'tencent|tdai|alibaba|repatriat|tcvdb|jieba|memory-tencentdb' -- . ':(exclude).github/workflows/ci.yml'; then
            echo "::error::origin-stack vocabulary found in tracked files — FALDA must stay origin-clean."
            exit 1
          fi
          echo "origin-clean: OK (no forbidden strings)"
